name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run db:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run balance:gate
      - run: npm run logics:validate

  unit:
    name: Unit (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: shared
            test_path: packages/shared
          - workspace: api
            test_path: apps/api
          - workspace: web
            test_path: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm test -- --coverage ${{ matrix.test_path }}

  postgres-integration:
    name: Postgres integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cr_league
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cr_league?schema=cr_league
      POSTGRES_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:deploy
      - run: npm test -- apps/api/src/app.postgres.test.ts

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --project=chromium --trace=retain-on-failure
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run build

  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - quality
      - unit
      - postgres-integration
      - e2e
      - build
    steps:
      - name: Fail when a required lane failed
        run: |
          if [ "${{ needs.quality.result }}" != "success" ] ||
             [ "${{ needs.unit.result }}" != "success" ] ||
             [ "${{ needs.postgres-integration.result }}" != "success" ] ||
             [ "${{ needs.e2e.result }}" != "success" ] ||
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "A required CI lane failed."
            exit 1
          fi
